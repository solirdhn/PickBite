<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - PickBite Merchant</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Menu Specific Styles */
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .filter-bar {
            background: white;
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .search-input {
            padding: 0.6rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            flex: 1;
            font-family: inherit;
        }

        /* Category Tabs Styles */
        .category-tabs-container {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .category-tabs {
            display: flex;
            gap: 2rem;
        }

        .category-tab {
            padding: 1rem 0;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .category-tab:hover {
            color: var(--pb-primary);
        }

        .category-tab.active {
            color: var(--pb-primary);
        }

        .category-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--pb-primary);
            border-radius: 10px;
        }

        .more-menu-container {
            position: relative;
        }

        .btn-more {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(75, 54, 33, 0.05);
            border-radius: var(--radius-sm);
            color: var(--pb-dark);
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
        }

        .btn-more:hover {
            background: rgba(75, 54, 33, 0.1);
        }

        .more-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            width: 200px;
            display: none;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
        }

        .more-dropdown.show {
            display: flex;
        }

        .dropdown-item {
            padding: 0.8rem 1.25rem;
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
            background: none;
            border: none;
        }

        .dropdown-item:hover {
            background: var(--pb-accent);
            color: var(--pb-primary);
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .food-card {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .food-card:hover {
            transform: translateY(-5px);
        }

        .food-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
        }

        .food-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .food-info .category {
            font-size: 0.8rem;
            color: var(--pb-primary);
            font-weight: 600;
            text-transform: uppercase;
        }

        .food-footer {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-weight: 700;
            color: var(--pb-dark);
            font-size: 1.2rem;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(75, 54, 33, 0.05);
            color: var(--pb-dark);
        }

        .btn-icon:hover {
            background: var(--pb-primary);
            color: white;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            width: 500px;
            max-width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-family: inherit;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-menu">
            <a href="index.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-clipboard-list"></i>
                <span>Orders</span>
            </a>
            <a href="menu-management.html" class="nav-item active">
                <i class="fas fa-utensils"></i>
                <span>Menu</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-tags"></i>
                <span>Categories</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Sales</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </div>
        <div class="nav-right">
            <div class="user-profile">
                <span class="user-name">Bite Bistro Merchant</span>
                <div class="user-avatar">BB</div>
                <a href="#" class="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <!-- Page Branding -->
            <div class="page-branding">
                <img src="PickBite_Logo.png" alt="PickBite" class="page-logo">
                <h1 class="page-brand-name">PickBite</h1>
            </div>

            <div class="menu-header">
                <div>
                    <h1>Your Restaurant Menu</h1>
                    <p style="color: var(--text-muted)">Manage food items, prices, and availability.</p>
                </div>
                <button class="btn-primary" onclick="openModal()">
                    <i class="fas fa-plus"></i> Add New Item
                </button>
            </div>

            <div class="filter-bar">
                <i class="fas fa-search" style="color: var(--text-muted)"></i>
                <input type="text" placeholder="Search food items..." class="search-input" id="searchBar">
            </div>

            <div class="category-tabs-container">
                <div class="category-tabs" id="tabList">
                    <!-- Tabs will be loaded here -->
                </div>
                <div class="more-menu-container">
                    <button class="btn-more" id="moreBtn">
                        More <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="more-dropdown" id="moreDropdown">
                        <!-- Dropdown items will be loaded here -->
                    </div>
                </div>
            </div>

            <div class="food-grid" id="foodGrid">
                <!-- Food items will be loaded here via JS -->
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit Item -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem">Add New Food Item</h2>
            <form id="foodForm">
                <input type="hidden" id="foodId">
                <div class="form-group">
                    <label>Food Name</label>
                    <input type="text" id="foodName" required placeholder="e.g. Nasi Lemak Special">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="foodCategory" required>
                        <option value="Main Course">Main Course</option>
                        <option value="Breakfast">Breakfast</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Dessert">Dessert</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem">
                    <input type="checkbox" id="isPopular" style="width: auto">
                    <label style="margin-bottom: 0">Mark as Popular</label>
                </div>
                <div class="form-group">
                    <label>Price (RM)</label>
                    <input type="number" id="foodPrice" step="0.01" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="foodDesc" rows="3" placeholder="Describe the dish..."></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="foodImage" placeholder="https://example.com/image.jpg">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-primary" style="background: transparent; color: var(--text-muted)" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript for Menu Logic -->
    <script>
        let menuItems = JSON.parse(localStorage.getItem('pb_menu')) || [
            { id: 1, name: 'Nasi Lemak Special', category: 'Main Course', price: 12.50, desc: 'Fragrant rice with sambal, chicken, and egg.', image: 'https://images.unsplash.com/photo-1626074353765-517a681e40be?w=500&auto=format&fit=crop', isPopular: true },
            { id: 2, name: 'Teh Tarik Kaw', category: 'Beverages', price: 3.50, desc: 'Pulled milk tea, extra frothy.', image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=500&auto=format&fit=crop', isPopular: true },
            { id: 3, name: 'Satay Ayam (6 pcs)', category: 'Main Course', price: 9.00, desc: 'Grilled chicken skewers with peanut sauce.', image: 'https://images.unsplash.com/photo-1514326640560-7d06307a0db4?w=500&auto=format&fit=crop', isPopular: true },
            { id: 4, name: 'Mee Goreng Mamak', category: 'Main Course', price: 8.50, desc: 'Spicy stir-fried noodles with tofu and egg.', image: 'https://images.unsplash.com/photo-1585032226651-759b368d7246?w=500&auto=format&fit=crop', isPopular: false },
            { id: 5, name: 'Chicken Rice', category: 'Main Course', price: 10.50, desc: 'Hainanese style steamed chicken with rice.', image: 'https://images.unsplash.com/photo-1626645738196-c2a0c87a9957?w=500&auto=format&fit=crop', isPopular: false },
            { id: 6, name: 'Milo Dinosaur', category: 'Beverages', price: 5.00, desc: 'Iced Milo topped with extra Milo powder.', image: 'milo-dinosaur.png', isPopular: true },
            { id: 7, name: 'Iced Lemon Tea', category: 'Beverages', price: 4.00, desc: 'Refreshing tea with a squeeze of fresh lemon.', image: 'iced-lemon-tea.png', isPopular: false },
            { id: 8, name: 'Cendol', category: 'Dessert', price: 4.50, desc: 'Shaved ice with green jelly and coconut milk.', image: 'cendol.png', isPopular: false },
            { id: 9, name: 'ABC (Air Batu Campur)', category: 'Dessert', price: 6.00, desc: 'Shaved ice with sweet syrup and toppings.', image: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=500&auto=format&fit=crop', isPopular: false },
            { id: 10, name: 'Roti Canai', category: 'Breakfast', price: 2.50, desc: 'Crispy flatbread served with dhal.', image: 'https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500&auto=format&fit=crop', isPopular: true }
        ];

        let activeTab = 'Popular';
        const categories = ["Popular", "Beverages", "Main Course", "Dessert"];
        const moreCategories = ["Breakfast", "All"];

        const foodGrid = document.getElementById('foodGrid');
        const foodForm = document.getElementById('foodForm');
        const modalOverlay = document.getElementById('modalOverlay');
        const tabList = document.getElementById('tabList');
        const moreDropdown = document.getElementById('moreDropdown');
        const moreBtn = document.getElementById('moreBtn');

        function renderTabs() {
            tabList.innerHTML = '';
            categories.forEach(cat => {
                const tab = document.createElement('div');
                tab.className = `category-tab ${activeTab === cat ? 'active' : ''}`;
                tab.innerText = cat;
                tab.onclick = () => {
                    activeTab = cat;
                    moreDropdown.classList.remove('show');
                    renderTabs();
                    renderMenu();
                };
                tabList.appendChild(tab);
            });

            moreDropdown.innerHTML = '';
            moreCategories.forEach(cat => {
                const item = document.createElement('button');
                item.className = 'dropdown-item';
                item.innerText = cat;
                item.onclick = () => {
                    activeTab = cat;
                    moreDropdown.classList.remove('show');
                    renderTabs();
                    renderMenu();
                };
                moreDropdown.appendChild(item);
            });
        }

        moreBtn.onclick = (e) => {
            e.stopPropagation();
            moreDropdown.classList.toggle('show');
        };

        window.onclick = () => {
            moreDropdown.classList.remove('show');
        };

        function renderMenu() {
            foodGrid.innerHTML = '';
            const searchQuery = document.getElementById('searchBar').value.toLowerCase();
            
            const filtered = menuItems.filter(item => {
                const matchesCategory = 
                    activeTab === 'Popular' ? item.isPopular : 
                    activeTab === 'All' ? true : 
                    item.category === activeTab;
                const matchesSearch = item.name.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                foodGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted)">
                    <i class="fas fa-search" style="font-size: 3rem; opacity: 0.1"></i>
                    <p style="margin-top: 1rem">No items found matching your criteria.</p>
                </div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card food-card';
                card.innerHTML = `
                    <img src="${item.image || 'https://via.placeholder.com/300x180?text=No+Image'}" alt="${item.name}" class="food-image">
                    <div class="food-info">
                        <span class="category">${item.category}</span>
                        <h3>${item.name}</h3>
                        <p style="font-size: 0.85rem; color: var(--text-muted); height: 40px; overflow: hidden">${item.desc}</p>
                    </div>
                    <div class="food-footer">
                        <span class="price">RM ${parseFloat(item.price).toFixed(2)}</span>
                        <div class="actions">
                            <button class="btn-icon" onclick="editItem(${item.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon btn-delete" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                foodGrid.appendChild(card);
            });
        }

        function openModal(editId = null) {
            modalOverlay.style.display = 'flex';
            if (editId) {
                const item = menuItems.find(i => i.id === editId);
                document.getElementById('modalTitle').innerText = 'Edit Food Item';
                document.getElementById('foodId').value = item.id;
                document.getElementById('foodName').value = item.name;
                document.getElementById('foodCategory').value = item.category;
                document.getElementById('foodPrice').value = item.price;
                document.getElementById('foodDesc').value = item.desc;
                document.getElementById('foodImage').value = item.image;
                document.getElementById('isPopular').checked = !!item.isPopular;
            } else {
                document.getElementById('modalTitle').innerText = 'Add New Food Item';
                foodForm.reset();
                document.getElementById('foodId').value = '';
                document.getElementById('isPopular').checked = false;
            }
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
        }

        foodForm.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('foodId').value;
            const newItem = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('foodName').value,
                category: document.getElementById('foodCategory').value,
                price: document.getElementById('foodPrice').value,
                desc: document.getElementById('foodDesc').value,
                image: document.getElementById('foodImage').value,
                isPopular: document.getElementById('isPopular').checked
            };

            if (id) {
                const index = menuItems.findIndex(i => i.id === parseInt(id));
                menuItems[index] = newItem;
            } else {
                menuItems.push(newItem);
            }

            localStorage.setItem('pb_menu', JSON.stringify(menuItems));
            closeModal();
            renderMenu();
        };

        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                menuItems = menuItems.filter(i => i.id !== id);
                localStorage.setItem('pb_menu', JSON.stringify(menuItems));
                renderMenu();
            }
        }

        function editItem(id) {
            openModal(id);
        }

        // Filters
        document.getElementById('searchBar').oninput = () => renderMenu();

        // Initial Load
        renderTabs();
        renderMenu();
    </script>
</body>
</html>
