<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickBite Merchant - Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Dashboard Specific Content */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .icon-orange { background: rgba(241, 143, 59, 0.1); color: var(--pb-primary); }
        .icon-yellow { background: rgba(239, 192, 38, 0.1); color: var(--pb-secondary); }
        .icon-blue { background: rgba(43, 144, 226, 0.1); color: #2B90E2; }
        .icon-green { background: rgba(39, 174, 96, 0.1); color: var(--success); }

        .stat-info h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--pb-dark); margin-top: 0.2rem; }

        .welcome-section {
            margin-bottom: 2.5rem;
        }

        .welcome-section h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .welcome-section p {
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="page-branding">
            <img src="PickBite_Logo.png" alt="PickBite" class="page-logo">
            <h1 class="page-brand-name">PickBite</h1>
        </div>
        <div class="nav-menu">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-clipboard-list"></i>
                <span>Orders</span>
            </a>
            <a href="menu-management.html" class="nav-item">
                <i class="fas fa-utensils"></i>
                <span>Menu</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-tags"></i>
                <span>Categories</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Sales</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </div>
        <div class="nav-right">
            <div class="user-profile">
                <span class="user-name">Bite Bistro Merchant</span>
                <div class="user-avatar">BB</div>
                <a href="#" class="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Content -->
            <section class="welcome-section">
                <h1>Welcome back, <span style="color: var(--pb-primary)" id="merchantName">Bite Bistro</span>!</h1>
                <p>Here's what happening with your restaurant today.</p>
            </section>

            <div class="stats-grid">
                <div class="card stat-card">
                    <div class="stat-icon icon-orange">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Total Orders</h3>
                        <div class="stat-value" id="totalOrders">0</div>
                    </div>
                </div>

                <div class="card stat-card">
                    <div class="stat-icon icon-green">
                        <i class="fas fa-coins"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Today's Revenue</h3>
                        <div class="stat-value" id="totalRevenue">RM 0.00</div>
                    </div>
                </div>

                <div class="card stat-card">
                    <div class="stat-icon icon-blue">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Pending Orders</h3>
                        <div class="stat-value" id="pendingOrders">0</div>
                    </div>
                </div>

                <div class="card stat-card">
                    <div class="stat-icon icon-yellow">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Menu Items</h3>
                        <div class="stat-value" id="totalMenuItems">0</div>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">Recent Orders</h3>
                    <div id="recentOrdersList">
                        <!-- Loaded via JS -->
                    </div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">Popular Items</h3>
                    <div id="popularItemsList" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Load data
        const menuItems = JSON.parse(localStorage.getItem('pb_menu')) || [];
        const orders = JSON.parse(localStorage.getItem('pb_orders')) || [];

        // Update Stats
        document.getElementById('totalOrders').innerText = orders.length;
        document.getElementById('totalMenuItems').innerText = menuItems.length;
        
        const revenue = orders.reduce((acc, curr) => acc + parseFloat(curr.total), 0);
        document.getElementById('totalRevenue').innerText = `RM ${revenue.toFixed(2)}`;
        
        const pending = orders.filter(o => o.status === 'Pending').length;
        document.getElementById('pendingOrders').innerText = pending;

        // Render Recent Orders
        const recentOrdersList = document.getElementById('recentOrdersList');
        if (orders.length === 0) {
            recentOrdersList.innerHTML = '<p style="color: var(--text-muted)">No orders yet.</p>';
        } else {
            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';
            table.innerHTML = `
                <thead>
                    <tr style="text-align: left; border-bottom: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.85rem">
                        <th style="padding: 10px">ID</th>
                        <th style="padding: 10px">Customer</th>
                        <th style="padding: 10px">Status</th>
                        <th style="padding: 10px">Total</th>
                    </tr>
                </thead>
                <tbody id="recentOrdersBody"></tbody>
            `;
            recentOrdersList.appendChild(table);
            const body = document.getElementById('recentOrdersBody');
            orders.slice(-5).reverse().forEach(o => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid #f9f9f9';
                tr.innerHTML = `
                    <td style="padding: 12px; font-weight: 600">${o.id}</td>
                    <td style="padding: 12px">${o.customer}</td>
                    <td style="padding: 12px"><span style="font-size: 0.75rem; font-weight: 700; color: var(--pb-primary)">${o.status}</span></td>
                    <td style="padding: 12px; font-weight: 700">RM ${parseFloat(o.total).toFixed(2)}</td>
                `;
                body.appendChild(tr);
            });
        }

        // Popular Items (Mock logic based on menu)
        const popularItemsList = document.getElementById('popularItemsList');
        if (menuItems.length === 0) {
            popularItemsList.innerHTML = '<p style="color: var(--text-muted)">Add menu items first.</p>';
        } else {
            menuItems.slice(0, 3).forEach(item => {
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.alignItems = 'center';
                div.innerHTML = `
                    <span>${item.name}</span>
                    <span class="btn-primary" style="padding: 2px 10px; font-size: 0.8rem; border-radius: 4px;">Popular</span>
                `;
                popularItemsList.appendChild(div);
            });
        }
    </script>
</body>
</html>
